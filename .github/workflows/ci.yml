name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm run check

      - uses: actions/upload-artifact@v7
        with:
          name: plugin-dist
          path: dist/
          if-no-files-found: error

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v4

      - name: Build SiYuan image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/siyuan/Dockerfile
          push: false

      - name: Build Hugo image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/hugo/Dockerfile
          push: false
